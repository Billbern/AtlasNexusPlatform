name: atlas-nexus-vllm

services:
  vllm:

    image: ${IMAGE}

    container_name: ${CONTAINER_NAME}

    restart: unless-stopped
    ports:
      - "${PORT}:8000"

    volumes:
      - ../../storage/models:/models

    ipc: host

    shm_size: 8g

    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}

    command:
      - --model
      - ${MODEL}
      - --host
      - ${HOST}
      - --port
      - "8000"
      - --dtype
      - ${DTYPE}
      - --gpu-memory-utilization
      - ${GPU_MEMORY_UTILIZATION}
      - --max-model-len
      - ${MAX_MODEL_LEN}
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --enable-reasoning
      - --reasoning-parser
      - qwen3

    runtime: nvidia

networks:
  default:
    external: true
    name: ${ATLAS_NEXUS_NETWORK}
