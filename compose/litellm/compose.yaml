name: atlas-nexus-litellm

services:
  litellm:
    image: ${IMAGE}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped

    ports:
      - "${PORT}:4000"

    volumes:
      - ../../storage/litellm:/storage
      - ../../storage/litellm/config/config.yaml:/app/config.yaml
      - ../../storage/litellm/plugins:/app/plugins

    environment:
      LITELLM_MODEL: ${LITELLM_MODEL}
      LITELLM_VLLM_BASE_URL: ${LITELLM_VLLM_BASE_URL}
      LITELLM_LOG_LEVEL: ${LITELLM_LOG_LEVEL}

    command:
      - --config
      - /app/config.yaml

    runtime: nvidia

networks:
  default:
    external: true
    name: ${ATLAS_NEXUS_NETWORK}