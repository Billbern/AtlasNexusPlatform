name: atlas-nexus-vllm-refiner

services:
  vllm-refiner:
    image: ${IMAGE}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${PORT}:8001"
    volumes:
      - ../../storage/models:/models
    ipc: host
    shm_size: 4g
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
    command:
      - ${MODEL}
      - --host
      - ${HOST}
      - --port
      - "8001"
      - --dtype
      - ${DTYPE}
      - --gpu-memory-utilization
      - ${GPU_MEMORY_UTILIZATION}
      - --max-model-len
      - ${MAX_MODEL_LEN}
      - --trust-remote-code
    runtime: nvidia

networks:
  default:
    external: true
    name: ${ATLAS_NEXUS_NETWORK}